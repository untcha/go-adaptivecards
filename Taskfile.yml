# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

vars:
  SCHEMA_VERSION: "1.5.0"
  SCHEMA_URL: "https://adaptivecards.io/schemas/{{.SCHEMA_VERSION}}/adaptive-card.json"
  SCHEMA_PATH: "internal/schema/adaptive-card.json"

  # GO_LIST_TEST_FILTER is a Go template used to filter packages that contain test files
  # (either regular test files or external test files).
  GO_LIST_TEST_FILTER: "{{`{{if or .TestGoFiles .XTestGoFiles}}{{.ImportPath}}{{end}}`}}"

  COVERAGE_DIR: coverage
  COVERAGE_FILE: "{{.COVERAGE_DIR}}/coverage.out"
  COVERAGE_HTML: "{{.COVERAGE_DIR}}/coverage.html"

  # BG_COVERAGE_OUT: "bg_image_coverage.out"
  # BG_COVERAGE_HTML: "bg_image_coverage.html"
  # BG_TEST_REGEX: "TestNewBackgroundImage|TestMustNewBackgroundImage|TestBackgroundImage"

tasks:
  update:schema:
    desc: Download Adaptive Cards schema version {{.SCHEMA_VERSION}}
    cmds:
      - mkdir -p internal/schema
      - curl -fsSL {{.SCHEMA_URL}} -o {{.SCHEMA_PATH}}
    generates:
      - "{{.SCHEMA_PATH}}"

  check:
    desc: Run all checks (formatting, linting, tests)
    cmds:
      - task: fmt
      - task: lint
      - task: test:existing

  clean:
    desc: Clean temp files and folders
    cmds:
      - rm -rf ./dist/
      - rm -rf ./bin/

  clean:caches:
    desc: Clean Go build and test caches
    cmds:
      - go clean -cache
      - go clean -testcache
      - echo "Cleared Go build and test caches"

  clean:coverage:
    desc: Clean coverage files
    cmds:
      - rm -rf {{.COVERAGE_DIR}}

  clean:all:
    desc: "Clean everything (builds, caches, coverage)"
    cmds:
      - task: clean
      - task: clean:caches
      - task: clean:coverage

  default:
    desc: Default task - show available tasks
    cmds:
      - task --list-all
    silent: true

  deps:
    desc: Download and verify dependencies
    cmds:
      - go mod download
      - go mod verify
      - go mod tidy

  deps:tidy:
    desc: Tidy dependencies (go.mod/go.sum)
    cmds:
      - go mod tidy

  deps:update:
    desc: Update dependencies
    cmds:
      - go get -u ./...
      - go mod tidy

  fmt:
    desc: Format Go code
    cmds:
      - go fmt ./...

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...

  lint:verbose:
    desc: Run golangci-lint with verbose output
    cmds:
      - golangci-lint run -v ./...

  lint:fmt:
    desc: Run golangci-lint formatter
    cmds:
      - golangci-lint fmt ./...

  test:
    desc: Run Go tests
    cmds:
      - go test ./...
    sources:
      - "**/*.go"
      - go.mod
      - go.sum

  test:fresh:
    desc: "Run Go tests with fresh cache"
    cmds:
      - go test -count=1 ./...

  test:verbose:
    desc: Run Go tests with verbose output and race detector
    cmds:
      - go test -v -race ./...
    sources:
      - "**/*.go"
      - go.mod
      - go.sum

  test:existing:
    desc: Run tests in packages containing test files only
    summary: |
      This task lists all packages that contain test files and runs tests only in those packages.
      This helps to avoid cluttering the output with "[no test files]" messages from packages without tests.

      It also considers both test files in the same package and external test files (XTestGoFiles).
      e.g. a package with `package foo` and `foo_test.go` with `package foo_test`.
    cmds:
      - go list -f '{{.GO_LIST_TEST_FILTER}}' ./... | xargs -r go test

  test:existing:verbose:
    desc: Run tests in packages containing test files only with verbose output
    summary: |
      This task lists all packages that contain test files and runs tests only in those packages.
      This helps to avoid cluttering the output with "[no test files]" messages from packages without tests.

      It also considers both test files in the same package and external test files (XTestGoFiles).
      e.g. a package with `package foo` and `foo_test.go` with `package foo_test`.
    cmds:
      - go list -f '{{.GO_LIST_TEST_FILTER}}' ./... | xargs -r go test -v

  test:coverage:
    desc: Run tests with coverage
    cmds:
      - mkdir -p {{.COVERAGE_DIR}}
      - go test -coverprofile={{.COVERAGE_FILE}} -covermode=atomic ./...
      - go tool cover -html={{.COVERAGE_FILE}} -o {{.COVERAGE_HTML}}
      - echo "Coverage report generated at {{.COVERAGE_HTML}}"
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
    generates:
      - "{{.COVERAGE_FILE}}"
      - "{{.COVERAGE_HTML}}"

  test:coverage:show:
    desc: Show test coverage in browser
    deps: [test:coverage]
    cmds:
      - cmd: open {{.COVERAGE_HTML}}
        platforms: [darwin]
      - cmd: xdg-open {{.COVERAGE_HTML}}
        platforms: [linux]
      - cmd: start {{.COVERAGE_HTML}}
        platforms: [windows]

  test:watch:
    desc: Watch for changes and run tests automatically
    deps: [test]
    watch: true
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
    cmds:
      - task: test:existing

  # test:background-image:
  #   desc: Run background-image related tests across all packages
  #   cmds:
  #     - go test -v ./... -run "{{.BG_TEST_REGEX}}"

  # test:background-image:coverage:
  #   desc: Run background-image related tests with coverage summary
  #   cmds:
  #     - go test -coverprofile={{.BG_COVERAGE_OUT}} ./... -run "{{.BG_TEST_REGEX}}"
  #     - go tool cover -func={{.BG_COVERAGE_OUT}}

