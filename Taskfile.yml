# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

# Source: https://github.com/untcha/meta
# General-purpose Taskfile for Go LIBRARIES (no binary/build-stamp/install tasks).
# Shared Go tasks (fmt, lint, deps, test:*, coverage, clean:caches/coverage) live
# in ../common.yml and are flattened into this namespace. Keep this file identical
# across library repos; put repo-specific tasks in Taskfile.project.yml (included
# below under the "project:" namespace).
# For CLI tools use ../cli/Taskfile.yml; for AWS Lambdas use ../lambda/Taskfile.yml.

includes:
    # Shared tasks, flattened so they appear unprefixed (e.g. `task lint`).
    common:
        taskfile: ./taskfiles/common.yml
        flatten: true

    # Repo-specific tasks live here and are namespaced (e.g. `task project:update:schema`).
    # optional:true keeps this generic Taskfile usable in repos without a project file.
    project:
        taskfile: ./taskfiles/Taskfile.project.yml
        optional: true

tasks:
    check:
        desc: Run all checks (formatting, linting, vet, compile, tests)
        cmds:
            - task: fmt
            - task: lint
            - task: vet
            - task: build
            - task: test:existing

    build:
        desc: Compile-check all packages (libraries produce no binary)
        cmds:
            - go build ./...
        sources:
            - "**/*.go"
            - go.mod
            - go.sum

    clean:all:
        desc: Clean everything (caches, coverage)
        cmds:
            - task: clean:caches
            - task: clean:coverage
