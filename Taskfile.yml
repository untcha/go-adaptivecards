  #   desc: Generate HTML coverage report for background-image tests
  #   cmds:
  #     - task test:background-image:coverage
  #     - go tool cover -html={{.BG_COVERAGE_OUT}} -o {{.BG_COVERAGE_HTML}}
  #     - echo "Background image coverage report generated at {{.BG_COVERAGE_HTML}}"
